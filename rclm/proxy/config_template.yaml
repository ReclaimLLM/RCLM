# ReclaimLLM proxy config — generated by `rclm-proxy setup`
# Edit this file to add/remove providers or models.
# Full docs: https://docs.litellm.ai/docs/proxy/configs

model_list:
  # Anthropic — all models via wildcard
  - model_name: anthropic/*
    litellm_params:
      model: anthropic/*
      api_key: os.environ/ANTHROPIC_API_KEY
      api_base: https://api.anthropic.com

  # OpenAI — all models via wildcard
  - model_name: openai/*
    litellm_params:
      model: openai/*
      api_key: os.environ/OPENAI_API_KEY
      api_base: https://api.openai.com/v1

  # Google Gemini — all models via wildcard
  - model_name: gemini/*
    litellm_params:
      model: gemini/*
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  # ReclaimLLM callback — captures every request/response and uploads to your server
  callbacks: rclm.proxy.litellm_callback.proxy_handler_instance

general_settings:
  port: 4000
  master_key: os.environ/LITELLM_MASTER_KEY   # use this as your Bearer token when calling the proxy
  disable_spend_logs: true       # no DB needed — ReclaimLLM handles its own storage
  disable_reset_budget: true
  disable_error_logs: false
